services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: issue_triager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - triager-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/GithubIssueTriager.Api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      Database__ConnectionString: "Host=db;Port=5432;Database=issue_triager;Username=postgres;Password=postgres"
      Cors__AllowedOrigins__0: "http://web:8080"
    ports:
      - "5101:8080"

  web:
    build:
      context: .
      dockerfile: src/GithubIssueTriager.Web/Dockerfile
    depends_on:
      - api
    environment:
      Api__BaseUrl: "http://api:8080"
    ports:
      - "5100:8080"

volumes:
  triager-db-data:
